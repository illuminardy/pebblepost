services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pebblepost
      POSTGRES_PASSWORD: pebblepost
      POSTGRES_DB: pebblepost
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pebblepost"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pebblepost:pebblepost@postgres:5432/pebblepost
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://backend:3000
    depends_on:
      - backend

volumes:
  pgdata:
